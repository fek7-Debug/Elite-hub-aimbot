<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Hub | Universal Aimbot</title>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Fondo con puntos de luz */
        .bg-dots {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .main-container {
            width: 90%;
            max-width: 400px;
            background: #0d0d0d;
            border: 1px solid #1f1f1f;
            border-radius: 30px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border-top: 2px solid #ff0000;
        }

        .logo-area {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #ff0000, #550000);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
            color: #fff;
        }

        h1 {
            font-size: 1.8rem;
            margin: 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .description {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Caja de Script Estilo Moderno */
        .script-box {
            background: #000;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #222;
            transition: 0.3s;
            position: relative;
        }

        .script-box:hover {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.1);
        }

        code {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #ff4d4d;
            word-break: break-all;
            text-align: left;
            line-height: 1.4;
        }

        /* Botón de Acción */
        .btn-copy {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        .btn-copy:active {
            transform: scale(0.96);
        }

        .btn-copy.copied {
            background: #ff0000;
            color: #fff;
        }

        .footer-tag {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-dots"></div>

    <div class="main-container">
        <div class="logo-area">E</div>
        <h1>Elite Hub <span style="color: #ff0000;">V6</span></h1>
        <p class="description">Aimbot Universal Edition</p>

        <div class="script-box">
            <code id="loadstring">loadstring(game:HttpGet("https://raw.githubusercontent.com/fek7-Debug/Elite-hub-aimbot/refs/heads/main/main.lua"))()</code>
        </div>

        <button class="btn-copy" id="copyBtn" onclick="doCopy()">
            COPIAR LOADSTRING
        </button>

        <div class="footer-tag">Project by fek7-debug • 2026</div>
    </div>

    <script>
        function doCopy() {
            const code = document.getElementById('loadstring').innerText;
            const btn = document.getElementById('copyBtn');
            
            navigator.clipboard.writeText(code);
            
            btn.innerText = "¡COPIADO!";
            btn.classList.add('copied');
            
            setTimeout(() => {
                btn.innerText = "COPIAR LOADSTRING";
                btn.classList.remove('copied');
            }, 2000);
        }
    </script>
</body>
</html>
