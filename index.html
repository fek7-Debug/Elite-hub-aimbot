<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Hub | Aimbot Edition</title>
    <style>
        :root {
            --primary: #ff0000; /* Rojo Sangre */
            --accent: #00f2ff; /* Cyan para el vibe de Lock-on */
            --bg: #020202;
        }
        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* Fondo de mira telescópica */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, black 80%),
                        linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            z-index: -1;
        }
        .container {
            text-align: center;
            background: rgba(10, 10, 10, 0.9);
            padding: 40px;
            border-radius: 5px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            max-width: 450px;
            width: 90%;
        }
        .ghost-img {
            width: 180px;
            filter: grayscale(1) contrast(1.2) drop-shadow(0 0 5px var(--primary));
            margin-bottom: 10px;
        }
        h1 {
            font-size: 2rem;
            margin: 0;
            color: white;
            text-shadow: 2px 2px var(--primary);
        }
        .status {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .loadstring {
            background: #000;
            padding: 15px;
            border: 1px solid #333;
            font-size: 0.8rem;
            margin: 20px 0;
            color: #00ff00; /* Verde código */
            text-align: left;
            word-break: break-all;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            letter-spacing: 2px;
            transition: 0.2s;
        }
        .btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 15px white;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/fek7-Debug/Elitehub/main/image.png" alt="Ghost Face" class="ghost-img">
        
        <h1>ELITE HUB</h1>
        <div class="status">[ AIMBOT EDITION : ACTIVE ]</div>

        <p style="font-size: 0.9rem; color: #bbb;">Silent Aim | Chest Lock | Smooth Motion</p>

        <div class="loadstring" id="copyText">
            loadstring(game:HttpGet("https://raw.githubusercontent.com/fek7-Debug/Elitehub/refs/heads/main/main.lua"))()
        </div>

        <button class="btn" onclick="copyScript()">Descargar Script</button>
    </div>

    <script>
        function copyScript() {
            const text = document.getElementById('copyText').innerText;
            navigator.clipboard.writeText(text);
            alert("🎯 TARGET LOCKED: Script copiado.");
        }
    </script>

</body>
</html>
